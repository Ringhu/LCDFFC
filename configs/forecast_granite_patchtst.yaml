# Granite PatchTST initialized foundation-like baseline
model:
  type: "granite_patchtst"
  history_len: 24
  output_dim: 3
  horizon: 24
  pretrained_model_name: "ibm-granite/granite-timeseries-patchtst"
  use_pretrained: true
  local_files_only: true
  freeze_backbone: false

training:
  epochs: 60
  batch_size: 32
  learning_rate: 0.0005
  weight_decay: 0.0001
  early_stopping_patience: 8
  loss: "mse"

spo_plus:
  enabled: false
  perturbation_eps: 0.1

checkpoint_dir: "artifacts/checkpoints/"

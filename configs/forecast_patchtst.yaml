# PatchTST forecast baseline configuration
model:
  type: "patchtst"
  input_dim: 7
  history_len: 24
  patch_length: 4
  patch_stride: 4
  d_model: 64
  num_layers: 3
  num_heads: 4
  ff_dim: 128
  output_dim: 3
  horizon: 24
  dropout: 0.1

training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  loss: "mse"

spo_plus:
  enabled: false
  perturbation_eps: 0.1

checkpoint_dir: "artifacts/checkpoints/"

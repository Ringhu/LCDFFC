# Transformer forecaster baseline configuration
model:
  type: "transformer"
  history_len: 24
  d_model: 128
  num_layers: 3
  num_heads: 4
  ff_dim: 256
  output_dim: 3
  horizon: 24
  dropout: 0.1

training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  loss: "mse"

spo_plus:
  enabled: false
  perturbation_eps: 0.1

checkpoint_dir: "artifacts/checkpoints/"
